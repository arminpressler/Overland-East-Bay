<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080" fill="none" role="img" aria-label="Abstract winch line and hook">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1b1a18"/>
      <stop offset="45%" stop-color="#3a332c"/>
      <stop offset="100%" stop-color="#8b6b43"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5d7a0" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#f5d7a0" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="rope" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f7d9a5"/>
      <stop offset="100%" stop-color="#d6a870"/>
    </linearGradient>
    <filter id="soft" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6"/>
    </filter>
  </defs>

  <rect width="1920" height="1080" fill="url(#bg)"/>
  <rect width="1920" height="1080" fill="url(#glow)"/>

  <g opacity="0.35">
    <path d="M-40 260 L640 40" stroke="#f0d7aa" stroke-width="8"/>
    <path d="M-40 360 L820 90" stroke="#f0d7aa" stroke-width="4"/>
    <path d="M-40 460 L980 140" stroke="#f0d7aa" stroke-width="3"/>
  </g>

  <g opacity="0.4">
    <circle cx="1480" cy="200" r="220" fill="#221d17"/>
    <circle cx="1520" cy="240" r="220" fill="#2f261d"/>
  </g>

  <path d="M120 860 C 420 720, 720 780, 1020 640 C 1300 510, 1500 520, 1790 380" stroke="url(#rope)" stroke-width="10" stroke-linecap="round" stroke-dasharray="14 10"/>
  <path d="M120 860 C 420 720, 720 780, 1020 640 C 1300 510, 1500 520, 1790 380" stroke="#000" stroke-opacity="0.15" stroke-width="16" stroke-linecap="round" filter="url(#soft)"/>

  <g transform="translate(1720 350) rotate(-18)">
    <path d="M0 0 h50" stroke="#f7d9a5" stroke-width="10" stroke-linecap="round"/>
    <path d="M50 0 c40 0 60 60 10 80" stroke="#f7d9a5" stroke-width="10" stroke-linecap="round"/>
    <path d="M60 80 c-30 30 -90 10 -90 -40" stroke="#f7d9a5" stroke-width="10" stroke-linecap="round"/>
    <circle cx="0" cy="0" r="14" fill="#f7d9a5"/>
  </g>

  <g opacity="0.25">
    <rect x="0" y="0" width="1920" height="1080" fill="none" stroke="#f7d9a5" stroke-width="2"/>
  </g>
</svg>
